name: electricity_bill_app
description: Monthly Electricity Bill Estimator

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  url_launcher: ^6.2.5
  flutter_native_splash: ^2.4.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#6A1B9A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#6A1B9A"
  image: assets/icon/splash.png
  android: true
  ios: false
  android_12:
    image: assets/icon/splash.png
    icon_background_color: "#6A1B9A"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/